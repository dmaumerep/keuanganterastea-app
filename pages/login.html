<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>

Login

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div
class="container mt-5">

<div
class="row justify-content-center">

<div
class="col-md-4">

<div
class="card">

<div
class="card-body">

<h3>

Sistem Keuangan
Teras Tea

</h3>

<hr>

<input
type="text"
id="username"
class="form-control mb-3"
placeholder="Username">

<input
type="password"
id="password"
class="form-control mb-3"
placeholder="Password">

<button
class="btn btn-primary w-100"
onclick="doLogin()">

Login

</button>

</div>

</div>

</div>

</div>

</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>

<script>

async function doLogin() {

    const username =
        document
        .getElementById(
            "username"
        )
        .value;

    const password =
        document
        .getElementById(
            "password"
        )
        .value;

    const result =
        await login(
            username,
            password
        );

    if (
        result.success
    ) {

        window.location.href =
            "../dashboard.html";

    }

    else {

        alert(
            result.message
        );

    }

}

</script>

</body>

</html>
